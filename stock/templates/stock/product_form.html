{% extends "core/base.html" %}
{% block content %}
<div class="container mt-4">
    <h2 class="text-center mb-4">
        {% if form.instance.pk %}تعديل المنتج{% else %}إضافة منتج جديد{% endif %}
    </h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            {{ form.as_p }}
        </div>
        <h4 class="mt-4">الوحدات</h4>
        {{ formset.management_form }}
        {% for form_unit in formset %}
            <div class="card mb-3">
                <div class="card-body">
                    {{ form_unit.as_p }}
                </div>
            </div>
        {% endfor %}
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{% url 'stock:product_list' %}" class="btn btn-secondary">إلغاء</a>
    </form>
</div>
{% endblock %}
